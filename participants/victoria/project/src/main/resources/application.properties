# Mentorship Matcher Application Configuration
spring.application.name=mentorship-matcher

# Server Configuration
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# H2 Database Configuration - File-based persistence
spring.datasource.url=jdbc:h2:file:./data/mentorship-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for debugging - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.wcc.bootcamp.java.mentorship=DEBUG

# MailHog Configuration (local development)
# Download MailHog from: https://github.com/mailhog/MailHog/releases
# Run: MailHog.exe (Windows) or mailhog (Mac/Linux)
# Web UI: http://localhost:8025
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.from=noreply@mentorship-matcher.local
spring.mail.enabled=true
# No authentication needed for MailHog
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
